name: Android CI

# DISABLED — scaffold only. Aragorn is actively landing Phases 2–7 on
# squad/android-port; we don't want noisy failures while source and test
# stubs churn. Flip `if: false` -> `if: true` (or remove the guards) once
# the scaffold stabilizes and Legolas has filled in enough test bodies
# for the suite to be meaningful.

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  shared-content-parity:
    name: SharedContent parity (Python)
    if: false  # TODO(legolas): enable once Phases 2–7 stabilize.
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Run cross-platform parity check
        run: python3 tests/shared-content-parity.py

  android-build-and-test:
    name: Android build + unit tests
    if: false  # TODO(legolas): enable once Phases 2–7 stabilize.
    runs-on: ubuntu-latest
    needs: shared-content-parity
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Assemble debug
        working-directory: android
        run: ./gradlew :app:assembleDebug --no-daemon

      - name: Run JVM unit tests
        working-directory: android
        run: ./gradlew :app:testDebugUnitTest --no-daemon

      - name: Upload test reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: unit-test-reports
          path: android/app/build/reports/tests/
          if-no-files-found: ignore
